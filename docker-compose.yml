version: '3.9'

services:
  # ─────────────────────────────────────────────
  # Neo4j Graph Database
  # ─────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: osint_neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (web UI)
      - "7687:7687"   # Bolt protocol (driver connection)
    environment:
      NEO4J_AUTH: neo4j/osintgraph2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: wget http://localhost:7474 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - osint_network

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint_backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: osintgraph2024
      HIBP_API_KEY: ${HIBP_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      REQUEST_TIMEOUT: 15.0
      USERNAME_CHECK_DELAY: 0.15
    volumes:
      - ./backend:/app
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - osint_network
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # React Frontend (Vite dev server)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: osint_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend
    networks:
      - osint_network
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:

networks:
  osint_network:
    driver: bridge
